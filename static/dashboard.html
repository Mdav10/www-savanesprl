<!DOCTYPE html>
<html>
<head>
    <title>SavaneSPRL - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#f0f2f5;padding:16px}
        .header{background:white;padding:16px;border-radius:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:16px}
        input,select{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:10px}
        button{background:#007bff;color:white;border:none;padding:12px;border-radius:10px;cursor:pointer}
        .btn-danger{background:#dc3545}
        .btn-warning{background:#ffc107;color:#333}
        .btn-small{padding:6px 12px;margin:0 5px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:10px;text-align:left;border-bottom:1px solid #ddd}
        th{background:#f8f9fa}
        .success{color:green;background:#e6ffed;padding:10px;border-radius:8px;margin-top:8px}
        .error{color:red;background:#ffe5e5;padding:10px;border-radius:8px;margin-top:8px}
        .flex{display:flex;gap:10px;flex-wrap:wrap}
        button{flex:1}
        .btn-small{flex:0}
    </style>
</head>
<body>
    <div class="header">
        <h2>🏢 SavaneSPRL</h2>
        <div><span id="userInfo"></span> <button class="btn-danger" onclick="logout()" style="width:auto;margin-left:10px">Déconnexion</button></div>
    </div>
    <div id="app"></div>
    <script>
        const token = localStorage.getItem('token');
        const role = localStorage.getItem('role');
        if (!token) window.location.href = '/';
        document.getElementById('userInfo').innerHTML = (role === 'DG' ? '👑 ' : '👤 ') + role;
        
        async function apiCall(url, options={}) {
            const res = await fetch(url, {
                ...options,
                headers: {'Authorization': 'Bearer ' + token, ...options.headers}
            });
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }
        
        async function loadDashboard() {
            if (role !== 'DG') {
                document.getElementById('app').innerHTML = '<div class="card"><h3>Votre rôle: ' + role + '</h3></div>';
                return;
            }
            
            let users = [];
            try { 
                const res = await fetch('/api/users/', {headers: {'Authorization': 'Bearer ' + token}});
                if (res.ok) users = await res.json();
            } catch(e) { console.log(e); }
            
            const nonDG = users.filter(u => u.role !== 'DG');
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h3>👥 Créer un utilisateur</h3>
                    <input type="text" id="nom" placeholder="Nom complet">
                    <input type="email" id="email" placeholder="Email">
                    <input type="text" id="username" placeholder="Nom d'utilisateur">
                    <input type="password" id="password" placeholder="Mot de passe">
                    <select id="roleSelect">
                        <option value="AGENT_STOCK">Agent Stock</option>
                        <option value="AGENT_COMMERCIAL">Agent Commercial</option>
                        <option value="COMPTABLE">Comptable</option>
                        <option value="DAF">DAF</option>
                        <option value="DT">DT</option>
                        <option value="DIRECTEUR_COMMERCIAL">Directeur Commercial</option>
                    </select>
                    <button onclick="createUser()">➕ Créer l'utilisateur</button>
                    <div id="createMsg"></div>
                </div>
                
                <div class="card">
                    <div class="flex">
                        <h3 style="flex:1">👥 Utilisateurs (${nonDG.length})</h3>
                        ${nonDG.length > 0 ? `<button class="btn-warning" onclick="deleteAllUsers()" style="flex:0">🗑️ Tout supprimer</button>` : ''}
                    </div>
                    ${nonDG.length === 0 ? '<p>Aucun utilisateur</p>' : `
                        <table>
                            <thead><tr><th>Nom</th><th>Username</th><th>Rôle</th><th>Email</th><th>Action</th></tr></thead>
                            <tbody>
                                ${nonDG.map(u => `
                                    <tr>
                                        <td>${u.nom}</td><td>${u.username}</td><td>${u.role}</td><td>${u.email}</td>
                                        <td><button class="btn-small btn-danger" onclick="deleteUser(${u.id})">🗑️ Supprimer</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;
        }
        
        async function createUser() {
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('roleSelect').value;
            
            if (!nom || !email || !username || !password) {
                document.getElementById('createMsg').innerHTML = '<div class="error">⚠️ Tous les champs sont requis</div>';
                return;
            }
            
            try {
                const res = await fetch(`/api/users/create?nom=${encodeURIComponent(nom)}&email=${encodeURIComponent(email)}&username=${encodeURIComponent(username)}&mot_de_passe=${encodeURIComponent(password)}&role=${role}`, {
                    method: 'POST',
                    headers: {'Authorization': 'Bearer ' + token}
                });
                if (res.ok) {
                    document.getElementById('createMsg').innerHTML = '<div class="success">✅ Utilisateur créé</div>';
                    setTimeout(() => location.reload(), 1000);
                } else {
                    const err = await res.json();
                    document.getElementById('createMsg').innerHTML = `<div class="error">❌ ${err.detail}</div>`;
                }
            } catch(e) {
                document.getElementById('createMsg').innerHTML = `<div class="error">❌ ${e.message}</div>`;
            }
        }
        
        async function deleteUser(id) {
            if (!confirm('Supprimer cet utilisateur ?')) return;
            await fetch(`/api/users/${id}`, {method: 'DELETE', headers: {'Authorization': 'Bearer ' + token}});
            location.reload();
        }
        
        async function deleteAllUsers() {
            if (!confirm('⚠️ Supprimer TOUS les utilisateurs ?')) return;
            await fetch('/api/users/delete-all', {method: 'DELETE', headers: {'Authorization': 'Bearer ' + token}});
            location.reload();
        }
        
        function logout() { localStorage.clear(); window.location.href = '/'; }
        
        loadDashboard();
    </script>
</body>
</html>
