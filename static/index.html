<!DOCTYPE html>
<html>
<head>
    <title>SavaneSPRL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-container {
            background: white;
            padding: 32px 24px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #1a1a2e;
            font-size: 32px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.95;
        }

        button:active {
            transform: scale(0.98);
        }

        .error {
            color: #dc3545;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            padding: 8px;
            background: #ffe5e5;
            border-radius: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔒 SavaneSPRL</h1>
        <div class="subtitle">Système de Gestion Sécurisé</div>
        
        <input type="text" id="username" placeholder="Nom d'utilisateur" autocomplete="off">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <div id="errorMsg" class="error hidden"></div>
    </div>

    <script>
        const API = window.location.origin;
        
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!username || !password) {
                errorDiv.innerHTML = 'Veuillez entrer vos identifiants';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            errorDiv.classList.add('hidden');
            
            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, mot_de_passe: password })
                });
                
                const data = await res.json();
                
                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.nom);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.innerHTML = 'Identifiants incorrects';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerHTML = 'Erreur de connexion au serveur';
                errorDiv.classList.remove('hidden');
            }
        }
        
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
        
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
