<!DOCTYPE html>
<html>
<head>
    <title>SavaneSPRL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px}
        .login-container{background:white;padding:32px;border-radius:28px;width:100%;max-width:400px}
        h1{text-align:center;margin-bottom:24px;color:#333}
        input{width:100%;padding:16px;margin:8px 0;border:1px solid #ddd;border-radius:14px;font-size:16px}
        button{width:100%;padding:16px;background:#667eea;color:white;border:none;border-radius:14px;font-size:18px;cursor:pointer;margin-top:16px}
        .error{color:red;text-align:center;margin-top:16px}
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔒 SavaneSPRL</h1>
        <input type="text" id="username" placeholder="Nom d'utilisateur" value="OsiasHab">
        <input type="password" id="password" placeholder="Mot de passe" value="08800Osi">
        <button onclick="login()">Se connecter</button>
        <div id="error" class="error"></div>
    </div>
    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        mot_de_passe: password
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('nom', data.nom);
                    window.location.href = '/dashboard';
                } else {
                    errorDiv.textContent = data.detail || 'Identifiants incorrects';
                }
            } catch (err) {
                errorDiv.textContent = 'Erreur de connexion au serveur';
                console.error('Login error:', err);
            }
        }
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
