<!DOCTYPE html>
<html>
<head>
    <title>SavaneSPRL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .login-container {
            background: white;
            padding: 32px 24px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #1a1a2e; font-size: 28px; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 32px; font-size: 14px; }
        input {
            width: 100%;
            padding: 16px;
            margin: 8px 0;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }
        .error { color: #dc3545; text-align: center; margin-top: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🔒 SavaneSPRL</h1>
        <div class="subtitle">Système de Gestion Sécurisé</div>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>
        <div id="errorMsg" class="error"></div>
    </div>
    <script>
        const API = window.location.origin;
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) {
                document.getElementById('errorMsg').innerText = 'Veuillez entrer vos identifiants';
                return;
            }
            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, mot_de_passe: password })
                });
                const data = await res.json();
                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('userName', data.nom);
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('errorMsg').innerText = 'Identifiants incorrects';
                }
            } catch(err) {
                document.getElementById('errorMsg').innerText = 'Erreur de connexion';
            }
        }
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
